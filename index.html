<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرداس | المنصة الإعلانية الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A66C2">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap');
        body { font-family: 'Cairo', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-slate-50">

    <nav class="bg-white border-b shadow-sm sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#0A66C2] text-white rounded-2xl flex items-center justify-center text-3xl font-bold">م</div>
                <h1 class="text-3xl font-bold">مرداس</h1>
            </div>
            <button onclick="toggleLogin()" id="login-btn" class="bg-[#0A66C2] hover:bg-blue-700 text-white px-6 py-3 rounded-3xl transition">تسجيل الدخول</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-8 text-center">
        <h1 class="text-5xl font-bold my-12">مرداس – المنصة الإعلانية الذكية</h1>
        <p id="status" class="text-emerald-600 font-medium text-lg"></p>
        
        <button id="dashboard-btn" onclick="showDashboard()" class="hidden mt-10 bg-[#0A66C2] text-white px-10 py-5 rounded-3xl text-xl font-medium shadow-lg">
            📊 فتح لوحة التحكم
        </button>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="hidden fixed inset-0 bg-black/70 z-[9999] flex items-center justify-center">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md mx-4">
            <h2 class="text-2xl font-bold mb-6 text-center" id="modal-title">تسجيل الدخول</h2>
            <input id="email" type="email" placeholder="البريد الإلكتروني" class="w-full px-5 py-4 border rounded-2xl mb-4">
            <input id="password" type="password" placeholder="كلمة المرور" class="w-full px-5 py-4 border rounded-2xl mb-6">
            <button onclick="handleAuth()" class="w-full py-4 bg-[#0A66C2] text-white rounded-3xl font-medium">دخول / إنشاء حساب</button>
            <button onclick="hideAuthModal()" class="mt-4 w-full py-3 text-slate-500">إغلاق</button>
        </div>
    </div>

    <!-- Dashboard Modal -->
    <div id="dashboard-modal" class="hidden fixed inset-0 bg-black/70 z-[9999] flex items-center justify-center">
        <div class="bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-auto mx-4">
            <div class="p-6 border-b flex justify-between sticky top-0 bg-white">
                <h2 class="text-2xl font-bold">لوحة التحكم</h2>
                <button onclick="hideDashboard()" class="text-3xl text-gray-400">×</button>
            </div>
            <div class="p-8">
                <div id="user-info" class="mb-8 text-lg"></div>

                <!-- تبويبات -->
                <div class="flex border-b mb-6">
                    <button onclick="switchTab(0)" id="tab-0" class="tab-btn active px-6 py-3 font-medium border-b-4 border-[#0A66C2]">الحملات</button>
                    <button onclick="switchTab(1)" id="tab-1" class="tab-btn px-6 py-3 font-medium">الشاشات</button>
                </div>

                <!-- تبويب الحملات -->
                <div id="tab-content-0">
                    <h3 class="font-semibold text-xl mb-4">حملاتي (Real-time)</h3>
                    <div id="campaigns-list" class="space-y-4 min-h-[100px]"></div>
                    <button onclick="addCampaign()" class="mt-8 w-full py-5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl text-lg">
                        + إضافة حملة جديدة
                    </button>
                </div>

                <!-- تبويب الشاشات -->
                <div id="tab-content-1" class="hidden">
                    <h3 class="font-semibold text-xl mb-4">شاشاتي</h3>
                    <div id="screens-list" class="space-y-4 min-h-[100px]"></div>
                    <button onclick="addScreen()" class="mt-8 w-full py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-3xl text-lg">
                        + إضافة شاشة جديدة
                    </button>
                </div>

                <button onclick="enableNotifications()" class="mt-10 w-full py-4 border-2 border-blue-600 text-blue-600 rounded-3xl hover:bg-blue-50">
                    🛎️ تفعيل الإشعارات
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDzugUdSZn10R9sdCSmFJozMt7l3Gn6HeE",
            authDomain: "netxapp-67f1c.firebaseapp.com",
            projectId: "netxapp-67f1c",
            storageBucket: "netxapp-67f1c.firebasestorage.app",
            messagingSenderId: "715459579684",
            appId: "1:715459579684:web:b0697cb6cd73ab287badb1"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const messaging = firebase.messaging();

        let currentUser = null;
        let currentTab = 0;

        auth.onAuthStateChanged(user => {
            currentUser = user;
            const loginBtn = document.getElementById('login-btn');
            const dashboardBtn = document.getElementById('dashboard-btn');
            const status = document.getElementById('status');

            if (user) {
                loginBtn.textContent = "تسجيل خروج";
                loginBtn.onclick = () => auth.signOut();
                dashboardBtn.classList.remove('hidden');
                status.innerHTML = `✅ مرحباً ${user.email}`;
            } else {
                loginBtn.textContent = "تسجيل الدخول";
                loginBtn.onclick = showAuthModal;
                dashboardBtn.classList.add('hidden');
                status.innerHTML = "Firebase جاهز";
            }
        });

        function showAuthModal() {
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('auth-modal').classList.add('flex');
        }

        function hideAuthModal() {
            const modal = document.getElementById('auth-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!email || !password) return alert("يرجى ملء الحقول");

            try {
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (e) {
                    if (e.code === 'auth/user-not-found') {
                        await auth.createUserWithEmailAndPassword(email, password);
                    } else throw e;
                }
                hideAuthModal();
            } catch (e) {
                alert("خطأ: " + e.message);
            }
        }

        function showDashboard() {
            if (!currentUser) return;
            document.getElementById('dashboard-modal').classList.remove('hidden');
            document.getElementById('dashboard-modal').classList.add('flex');
            
            document.getElementById('user-info').innerHTML = `
                <p class="text-xl">مرحباً، <strong>${currentUser.email}</strong></p>
            `;

            switchTab(0); // افتراضياً يفتح تبويب الحملات
        }

        function hideDashboard() {
            document.getElementById('dashboard-modal').classList.add('hidden');
            document.getElementById('dashboard-modal').classList.remove('flex');
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === tab);
                btn.classList.toggle('border-b-4', i === tab);
                btn.classList.toggle('border-[#0A66C2]', i === tab);
            });
            document.getElementById('tab-content-0').classList.toggle('hidden', tab !== 0);
            document.getElementById('tab-content-1').classList.toggle('hidden', tab !== 1);

            if (tab === 0) loadCampaigns();
            if (tab === 1) loadScreens();
        }

        // ==================== الحملات ====================
        async function loadCampaigns() {
            const list = document.getElementById('campaigns-list');
            list.innerHTML = '<p class="text-slate-500">جاري التحميل...</p>';

            try {
                const snapshot = await db.collection("campaigns").where("userId", "==", currentUser.uid).get();
                if (snapshot.empty) {
                    list.innerHTML = `<p class="text-slate-500 py-8 text-center">لا توجد حملات بعد</p>`;
                    return;
                }
                let html = '';
                snapshot.forEach(doc => {
                    const d = doc.data();
                    html += `
                        <div class="border border-emerald-200 bg-emerald-50 rounded-3xl p-6">
                            <div class="font-bold">${d.title}</div>
                            <div class="text-emerald-700">${d.budget} ر.س • ${d.status || 'نشط'}</div>
                        </div>
                    `;
                });
                list.innerHTML = html;
            } catch (e) {
                list.innerHTML = `<p class="text-red-500">خطأ: ${e.message}</p>`;
            }
        }

        async function addCampaign() {
            const title = prompt("اسم الحملة:");
            if (!title) return;
            const budget = parseInt(prompt("الميزانية (ر.س):", "5000")) || 5000;

            try {
                await db.collection("campaigns").add({
                    userId: currentUser.uid,
                    title, budget, status: "نشط",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("✅ تمت الإضافة!");
                loadCampaigns();
            } catch (e) {
                alert("خطأ: " + e.message);
            }
        }

        // ==================== الشاشات ====================
        async function loadScreens() {
            const list = document.getElementById('screens-list');
            list.innerHTML = '<p class="text-slate-500">جاري التحميل...</p>';

            try {
                const snapshot = await db.collection("screens").where("userId", "==", currentUser.uid).get();
                if (snapshot.empty) {
                    list.innerHTML = `<p class="text-slate-500 py-8 text-center">لا توجد شاشات مسجلة بعد</p>`;
                    return;
                }
                let html = '';
                snapshot.forEach(doc => {
                    const d = doc.data();
                    html += `
                        <div class="border border-blue-200 bg-blue-50 rounded-3xl p-6">
                            <div class="font-bold">${d.name}</div>
                            <div class="text-blue-700">${d.location} • ${d.size} • ${d.status}</div>
                        </div>
                    `;
                });
                list.innerHTML = html;
            } catch (e) {
                list.innerHTML = `<p class="text-red-500">خطأ: ${e.message}</p>`;
            }
        }

        async function addScreen() {
            const name = prompt("اسم الشاشة أو رقمها:");
            if (!name) return;
            const location = prompt("موقع الشاشة (مثال: الرياض مول - المدخل الرئيسي):", "الرياض");
            const size = prompt("حجم الشاشة (مثال: 55 إنش):", "55 إنش");

            try {
                await db.collection("screens").add({
                    userId: currentUser.uid,
                    name: name,
                    location: location,
                    size: size,
                    status: "نشط",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("✅ تم إضافة الشاشة بنجاح!");
                loadScreens();
            } catch (e) {
                alert("خطأ: " + e.message);
            }
        }

        // Push Notifications
        async function enableNotifications() {
            try {
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') return alert("تم رفض الإذن");

                const token = await messaging.getToken({
                    vapidKey: "BOfXbijxgCHAUuXEmiBlQiDr3HEVBx4QXXQQ55I3vEMFLWyz3PHCtlAZwZ4X18yyn4T0wLLSS_tg6ObpfEmXY58"
                });

                console.log("FCM Token:", token);
                alert("✅ تم تفعيل الإشعارات بنجاح!");
            } catch (e) {
                alert("خطأ: " + e.message);
            }
        }

        function toggleLogin() {
            if (auth.currentUser) {
                auth.signOut();
            } else {
                showAuthModal();
            }
        }

        // تهيئة
        document.getElementById('status').innerHTML = '✅ Firebase متصل • مرداس جاهز بالكامل';
        console.log('%c🚀 مرداس الآن مع الحملات + إدارة الشاشات + الإشعارات', 'color:#0A66C2; font-size:18px');
    </script>
</body>
</html>
